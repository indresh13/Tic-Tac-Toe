<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tic Tac Toe Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
<script src="script.js"></script>
</head>

<body>

<div class="container">

  <!-- Start Screen -->
  <div id="startScreen">
    <h1>Tic Tac Toe</h1>
    <p>Play smart. Win fast.</p>

    <input id="p1" placeholder="Player 1 Name">
    <input id="p2" placeholder="Player 2 / AI">

    <button onclick="startGame('pvp')">Player vs Player</button>
    <button onclick="startGame('ai')">Player vs AI</button>
  </div>

  <!-- Game Screen -->
  <div id="gameScreen" class="hidden">
    <h1>Game</h1>

    <div id="status"></div>

    <div class="board" id="board"></div>

    <div class="score">
      X: <span id="scoreX">0</span> |
      O: <span id="scoreO">0</span>
    </div>

    <button onclick="restart()">Restart</button>
    <button onclick="goHome()">New Game</button>
  </div>

</div>

</body>
</html>
